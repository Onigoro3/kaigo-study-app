<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>介護請求 自主学習アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ai-mark { background-color: #fef08a; padding: 0 4px; border-radius: 2px; font-weight: bold; }
        .user-mark { background-color: #fbcfe8; padding: 0 4px; border-radius: 2px; }
        /* 文字サイズ調整用の基本クラス */
        .text-size-normal { font-size: 1rem; line-height: 1.8; }
        .text-size-large { font-size: 1.25rem; line-height: 2.0; }
        .text-size-xlarge { font-size: 1.5rem; line-height: 2.2; }
    </style>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal pb-10">

    <nav class="bg-blue-600 p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a class="text-white text-xl font-bold" href="#">介護請求ナビゲーター</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 text-gray-700">📥 写真を読み込んで学習</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">読み込む種類</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="scan-mode" value="textbook" class="mr-2" checked> 教科書（図面対応）
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="scan-mode" value="workbook" class="mr-2"> 問題集
                        </label>
                    </div>
                </div>

                <div class="mb-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <label class="block text-sm font-bold text-gray-700 mb-2">📁 保存先フォルダ</label>
                    <div class="flex space-x-2">
                        <input type="text" id="folder-name" class="w-full border-2 border-gray-300 rounded-lg p-2 focus:outline-none focus:border-blue-500" placeholder="例: 1-1 居宅介護支援費">
                        <button onclick="addFolder()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded shadow">追加</button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-white hover:bg-gray-50 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <p class="text-sm text-blue-600 font-semibold">📸 複数枚の写真を選択</p>
                        </div>
                        <input type="file" id="image-upload" class="hidden" accept="image/*" multiple />
                    </label>
                    <p id="file-name" class="text-xs text-center text-green-600 font-bold mt-2 h-4"></p>
                </div>
                
                <button id="extract-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition duration-200">
                    AIに送信して解析スタート
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h2 class="text-xl font-bold mb-4 text-gray-700">📂 登録済みフォルダ管理</h2>
                
                <ul id="folder-list" class="space-y-2 mb-6 max-h-40 overflow-y-auto border p-2 rounded bg-gray-50">
                    </ul>

                <h2 class="text-xl font-bold mb-4 text-gray-700 border-t pt-4">🎯 過去の問題を解く</h2>
                <div class="mb-6">
                    <select id="quiz-folder-select" class="w-full border-2 border-gray-300 rounded-lg p-2 focus:outline-none focus:border-green-500 bg-white">
                        <option>すべての範囲から</option>
                    </select>
                </div>
                <button class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded shadow transition">選択した範囲からスタート</button>
            </div>
        </div>

        <div id="text-area" class="hidden mt-8 bg-white p-6 md:p-8 rounded-lg shadow-xl border-t-4 border-purple-500">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b pb-4 gap-4">
                <h2 class="text-2xl font-bold text-gray-800">📄 読み取りテキスト（図解含む）</h2>
                
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-gray-600">文字サイズ:</span>
                    <button onclick="changeFontSize('normal')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">中</button>
                    <button onclick="changeFontSize('large')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">大</button>
                    <button onclick="changeFontSize('xlarge')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">特大</button>
                    
                    <button id="highlight-btn" class="ml-4 bg-pink-500 hover:bg-pink-600 text-white text-sm font-bold py-2 px-4 rounded shadow">
                        🖋 選択文字にマーカー
                    </button>
                </div>
            </div>
            <div id="readable-text" class="text-gray-700 bg-gray-50 p-6 rounded-lg border text-size-normal"></div>
        </div>

        <div id="quiz-area" class="hidden mt-8 bg-white p-6 md:p-8 rounded-lg shadow-xl border-t-4 border-yellow-400">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">✨ 生成された問題</h2>
            <div id="quiz-container" class="space-y-6"></div>
        </div>
    </div>

    <script>
        // --- フォルダ管理（LocalStorage使用） ---
        let folders = JSON.parse(localStorage.getItem('studyFolders')) || [];

        function renderFolders() {
            const list = document.getElementById('folder-list');
            const select = document.getElementById('quiz-folder-select');
            list.innerHTML = '';
            select.innerHTML = '<option>すべての範囲から</option>';

            folders.forEach((folder, index) => {
                // リストへの追加（編集・削除ボタン付き）
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white p-2 border rounded shadow-sm";
                li.innerHTML = `
                    <span class="font-bold text-gray-700 flex-1">${folder}</span>
                    <div class="flex space-x-2">
                        <button onclick="editFolder(${index})" class="text-xs bg-yellow-400 hover:bg-yellow-500 text-white py-1 px-2 rounded">名前変更</button>
                        <button onclick="deleteFolder(${index})" class="text-xs bg-red-500 hover:bg-red-600 text-white py-1 px-2 rounded">削除</button>
                    </div>
                `;
                list.appendChild(li);

                // プルダウンへの追加
                const option = document.createElement('option');
                option.textContent = folder;
                select.appendChild(option);
            });
        }

        function addFolder() {
            const input = document.getElementById('folder-name');
            const val = input.value.trim();
            if (val && !folders.includes(val)) {
                folders.push(val);
                localStorage.setItem('studyFolders', JSON.stringify(folders));
                input.value = '';
                renderFolders();
            }
        }

        function editFolder(index) {
            const newName = prompt("新しいフォルダ名を入力してください:", folders[index]);
            if (newName && newName.trim() !== "") {
                folders[index] = newName.trim();
                localStorage.setItem('studyFolders', JSON.stringify(folders));
                renderFolders();
            }
        }

        function deleteFolder(index) {
            if (confirm(`フォルダ「${folders[index]}」を削除してもよろしいですか？`)) {
                folders.splice(index, 1);
                localStorage.setItem('studyFolders', JSON.stringify(folders));
                renderFolders();
            }
        }

        // 初期表示
        renderFolders();

        // --- 文字サイズ変更機能 ---
        function changeFontSize(sizeMode) {
            const textBox = document.getElementById('readable-text');
            textBox.classList.remove('text-size-normal', 'text-size-large', 'text-size-xlarge');
            textBox.classList.add(`text-size-${sizeMode}`);
        }

        // --- AI解析の処理 ---
        const imageInput = document.getElementById('image-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const extractBtn = document.getElementById('extract-btn');
        const textArea = document.getElementById('text-area');
        const readableText = document.getElementById('readable-text');
        const quizArea = document.getElementById('quiz-area');
        const quizContainer = document.getElementById('quiz-container');

        // 複数ファイルの選択表示
        imageInput.addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                fileNameDisplay.textContent = `📸 ${e.target.files.length}枚の画像がセットされました`;
            }
        });

        extractBtn.addEventListener('click', async function() {
            if(!imageInput.files.length) {
                alert("画像を選択してください！");
                return;
            }

            const mode = document.querySelector('input[name="scan-mode"]:checked').value;
            const formData = new FormData();
            
            // 複数ファイルをすべて追加
            for(let i = 0; i < imageInput.files.length; i++){
                formData.append("files", imageInput.files[i]);
            }
            formData.append("mode", mode);

            extractBtn.textContent = "⚙️ AIが画像を解析中...（図面解析含む）";
            extractBtn.disabled = true;
            extractBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                const response = await fetch("/api/analyze", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("サーバーエラーが発生しました");

                const data = await response.json();
                
                textArea.classList.add('hidden');
                quizArea.classList.add('hidden');
                quizContainer.innerHTML = '';

                if (data.type === "textbook" && data.extracted_text) {
                    readableText.innerHTML = data.extracted_text.replace(/\n/g, '<br>');
                    textArea.classList.remove('hidden');
                }

                const questions = data.generated_questions || data.questions;
                if (questions && questions.length > 0) {
                    questions.forEach((q, index) => {
                        let optionsHtml = '';
                        if (q.options && q.options.length > 0) {
                            optionsHtml = '<div class="space-y-2 mt-4">';
                            q.options.forEach((opt, i) => {
                                optionsHtml += `
                                    <label class="block p-3 border rounded bg-white hover:bg-blue-50 cursor-pointer text-lg">
                                        <input type="radio" name="q${index}" class="mr-2"> ${opt}
                                    </label>
                                `;
                            });
                            optionsHtml += '</div>';
                        } else {
                            optionsHtml = `<input type="text" class="mt-4 border p-3 rounded w-full sm:w-64 text-lg" placeholder="解答を入力">`;
                        }

                        const questionBlock = `
                            <div class="p-4 bg-gray-50 rounded-lg border">
                                <h3 class="font-bold text-lg text-blue-900 leading-relaxed">Q${index + 1}. ${q.question_text}</h3>
                                ${optionsHtml}
                                <button class="mt-4 bg-blue-600 text-white font-bold py-2 px-4 rounded shadow" onclick="document.getElementById('ans${index}').classList.remove('hidden')">
                                    答えと解説を見る
                                </button>
                                <div id="ans${index}" class="hidden mt-4 p-4 bg-green-100 text-green-900 rounded border border-green-300">
                                    <p class="font-bold text-xl mb-2">正解：${q.answer}</p>
                                    <hr class="border-green-300 mb-2">
                                    <p class="text-base leading-relaxed whitespace-pre-wrap">${q.explanation}</p>
                                </div>
                            </div>
                        `;
                        quizContainer.innerHTML += questionBlock;
                    });
                    quizArea.classList.remove('hidden');
                }

                if(data.type === "textbook") {
                    textArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    quizArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

            } catch (error) {
                alert("解析に失敗しました。\n詳細: " + error.message);
            } finally {
                extractBtn.textContent = "AIに送信して解析スタート";
                extractBtn.disabled = false;
                extractBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });

        // マーカー機能
        document.getElementById('highlight-btn').addEventListener('click', function() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.toString().trim() === '') {
                alert("マーカーを引きたい文字をなぞってからボタンを押してください。");
                return;
            }
            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.className = 'user-mark';
            try {
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch (e) {
                alert("改行などをまたいでマーカーを引くことはできません。");
            }
        });
    </script>
</body>
</html>
