<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学習ナビゲーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ai-mark { background-color: #fef08a; padding: 0 4px; border-radius: 2px; font-weight: bold; }
        .user-mark { background-color: #fbcfe8; padding: 0 4px; border-radius: 2px; }
        .text-size-xsmall { font-size: 0.75rem; line-height: 1.5; }
        .text-size-small { font-size: 0.875rem; line-height: 1.6; }
        .text-size-normal { font-size: 1rem; line-height: 1.8; }
        .text-size-large { font-size: 1.25rem; line-height: 2.0; }
        .text-size-xlarge { font-size: 1.5rem; line-height: 2.2; }
    </style>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal pb-10">

    <nav class="bg-blue-600 p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a class="text-white text-xl font-bold" href="#">📚 AI学習ナビゲーター</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        
        <div id="dashboard-page" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 text-gray-700">📥 新しい学習データの追加</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">読み込む種類</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="scan-mode" value="textbook" class="mr-2" checked> 教科書（図面対応）
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="scan-mode" value="workbook" class="mr-2"> 問題集
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">生成する問題数（教科書モード時）</label>
                    <select id="question-count" class="w-full border-2 border-gray-300 rounded-lg p-2 focus:outline-none focus:border-blue-500 bg-white">
                        <option value="3">3問（サクッと）</option>
                        <option value="5">5問（標準）</option>
                        <option value="7">7問（しっかり）</option>
                        <option value="10">10問（がっつり）</option>
                    </select>
                </div>

                <div class="mb-4 p-4 bg-blue-50 rounded-lg border border-blue-100">
                    <label class="block text-sm font-bold text-gray-700 mb-3">📁 保存先フォルダ構成</label>
                    <div class="space-y-3">
                        <div>
                            <span class="text-xs text-blue-800 font-bold">大カテゴリ</span>
                            <input type="text" id="folder-large" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-blue-500" placeholder="例: 介護、IT、語学">
                        </div>
                        <div>
                            <span class="text-xs text-blue-800 font-bold">中カテゴリ</span>
                            <input type="text" id="folder-medium" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-blue-500" placeholder="例: 介護保険、Python、英語">
                        </div>
                        <div>
                            <span class="text-xs text-blue-800 font-bold">小フォルダ（セクション）</span>
                            <input type="text" id="folder-small" class="w-full border border-gray-300 rounded p-2 text-sm focus:border-blue-500" placeholder="例: 1-1 居宅介護支援費">
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">※未入力の部分は「未分類」として保存されます。</p>
                </div>

                <div class="mb-6">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-white hover:bg-gray-50 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <p class="text-sm text-blue-600 font-semibold">📸 複数枚の写真を選択</p>
                        </div>
                        <input type="file" id="image-upload" class="hidden" accept="image/*" multiple />
                    </label>
                    <p id="file-name" class="text-xs text-center text-green-600 font-bold mt-2 h-4"></p>
                </div>
                
                <button id="extract-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded shadow transition duration-200">
                    AIに送信して解析・保存スタート
                </button>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500 flex flex-col">
                <h2 class="text-xl font-bold mb-4 text-gray-700">🎯 過去のデータから復習する</h2>
                <p class="text-sm text-gray-600 mb-6">保存されたフォルダを選んで、以前のテキストと問題を呼び出します。</p>
                
                <div class="mb-6 flex-grow">
                    <label class="block text-sm font-bold text-gray-700 mb-2">📂 復習する範囲</label>
                    <select id="quiz-folder-select" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-green-500 bg-white h-48" size="6">
                        </select>
                </div>

                <div class="space-y-3">
                    <button onclick="loadSavedData()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded shadow transition">
                        この範囲を復習する
                    </button>
                    <button onclick="deleteSelectedFolder()" class="w-full bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 px-4 rounded transition">
                        選択したフォルダを削除
                    </button>
                </div>
            </div>
        </div>

        <div id="study-page" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <button onclick="returnToDashboard()" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-6 rounded shadow flex items-center transition">
                    <span class="mr-2">←</span> トップへ戻る
                </button>
                <span id="current-folder-display" class="font-bold text-blue-800 bg-blue-100 py-1 px-3 rounded-full text-sm"></span>
            </div>

            <div id="text-area" class="hidden bg-white p-6 md:p-8 rounded-lg shadow-xl border-t-4 border-purple-500 mb-8">
                <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 border-b pb-4 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">📄 読み取りテキスト（図解含む）</h2>
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-sm font-bold text-gray-600 mr-2">文字サイズ:</span>
                        <button onclick="changeFontSize('xsmall')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow text-xs">極小</button>
                        <button onclick="changeFontSize('small')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow text-sm">小</button>
                        <button onclick="changeFontSize('normal')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">中</button>
                        <button onclick="changeFontSize('large')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">大</button>
                        <button onclick="changeFontSize('xlarge')" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-1 px-3 rounded shadow">特大</button>
                        <button id="highlight-btn" class="ml-2 bg-pink-500 hover:bg-pink-600 text-white text-sm font-bold py-2 px-4 rounded shadow">🖋 マーカー</button>
                    </div>
                </div>
                <div id="readable-text" class="text-gray-700 bg-gray-50 p-6 rounded-lg border text-size-normal"></div>
            </div>

            <div id="quiz-area" class="hidden bg-white p-6 md:p-8 rounded-lg shadow-xl border-t-4 border-yellow-400">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">✨ 問題</h2>
                <div id="quiz-container" class="space-y-6"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 📂 3階層フォルダ管理（データ保存機能） ---
        // studyData = { "介護": { "介護保険": { "1-1": [保存データ1, 保存データ2...] } } } のような構造で保存します
        let studyData = JSON.parse(localStorage.getItem('studyDataTree')) || {};

        function renderFolderSelect() {
            const select = document.getElementById('quiz-folder-select');
            select.innerHTML = '';
            
            let hasFolders = false;
            for (const L in studyData) {
                for (const M in studyData[L]) {
                    for (const S in studyData[L][M]) {
                        hasFolders = true;
                        const dataCount = studyData[L][M][S].length;
                        const option = document.createElement('option');
                        // 復習時に呼び出せるようにパスを value にセット
                        option.value = `${L}|${M}|${S}`;
                        option.textContent = `📁 ${L} ＞ ${M} ＞ ${S} (${dataCount}件の記録)`;
                        option.className = "p-2 border-b hover:bg-green-50";
                        select.appendChild(option);
                    }
                }
            }
            if(!hasFolders) {
                select.innerHTML = '<option value="" disabled>まだ保存されたデータがありません</option>';
            }
        }

        function saveToFolder(large, medium, small, data) {
            large = large || '未分類';
            medium = medium || '未分類';
            small = small || '未分類';

            if (!studyData[large]) studyData[large] = {};
            if (!studyData[large][medium]) studyData[large][medium] = {};
            if (!studyData[large][medium][small]) studyData[large][medium][small] = [];

            // AIからの結果を配列に追加
            studyData[large][medium][small].push(data);
            localStorage.setItem('studyDataTree', JSON.stringify(studyData));
            renderFolderSelect();
        }

        function deleteSelectedFolder() {
            const val = document.getElementById('quiz-folder-select').value;
            if (!val) return alert("削除するフォルダを選択してください。");
            
            const [L, M, S] = val.split('|');
            if (confirm(`「${L} ＞ ${M} ＞ ${S}」のデータを全て削除してもよろしいですか？`)) {
                delete studyData[L][M][S];
                // 空になった上位フォルダも掃除する
                if (Object.keys(studyData[L][M]).length === 0) delete studyData[L][M];
                if (Object.keys(studyData[L]).length === 0) delete studyData[L];
                
                localStorage.setItem('studyDataTree', JSON.stringify(studyData));
                renderFolderSelect();
            }
        }

        // 初期表示
        renderFolderSelect();

        // --- 📖 学習画面の表示と構築 ---
        const dashboardPage = document.getElementById('dashboard-page');
        const studyPage = document.getElementById('study-page');
        const textArea = document.getElementById('text-area');
        const readableText = document.getElementById('readable-text');
        const quizArea = document.getElementById('quiz-area');
        const quizContainer = document.getElementById('quiz-container');
        const currentFolderDisplay = document.getElementById('current-folder-display');

        function returnToDashboard() {
            studyPage.classList.add('hidden');
            dashboardPage.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changeFontSize(sizeMode) {
            readableText.classList.remove('text-size-xsmall', 'text-size-small', 'text-size-normal', 'text-size-large', 'text-size-xlarge');
            readableText.classList.add(`text-size-${sizeMode}`);
        }

        // AIからのデータ、または保存されたデータを画面に組み立てる関数
        function renderStudyPage(extractedTexts, questions, folderPathStr) {
            textArea.classList.add('hidden');
            quizArea.classList.add('hidden');
            quizContainer.innerHTML = '';
            currentFolderDisplay.textContent = folderPathStr;

            // テキスト部分の構築
            if (extractedTexts.length > 0) {
                // 複数のテキストがある場合は線で区切って表示
                readableText.innerHTML = extractedTexts.join('<br><hr class="my-4 border-dashed border-purple-300"><br>');
                textArea.classList.remove('hidden');
            }

            // 問題部分の構築
            if (questions && questions.length > 0) {
                questions.forEach((q, index) => {
                    let optionsHtml = '';
                    if (q.options && q.options.length > 0) {
                        optionsHtml = '<div class="space-y-2 mt-4">';
                        q.options.forEach((opt, i) => {
                            optionsHtml += `
                                <label class="block p-3 border rounded bg-white hover:bg-blue-50 cursor-pointer text-lg">
                                    <input type="radio" name="q${index}" class="mr-2"> ${opt}
                                </label>
                            `;
                        });
                        optionsHtml += '</div>';
                    } else {
                        optionsHtml = `<input type="text" class="mt-4 border p-3 rounded w-full sm:w-64 text-lg" placeholder="解答を入力">`;
                    }

                    const questionBlock = `
                        <div class="p-4 bg-gray-50 rounded-lg border">
                            <h3 class="font-bold text-lg text-blue-900 leading-relaxed">Q${index + 1}. ${q.question_text}</h3>
                            ${optionsHtml}
                            <button class="mt-4 bg-blue-600 text-white font-bold py-2 px-4 rounded shadow" onclick="document.getElementById('ans${index}').classList.remove('hidden')">
                                答えと解説を見る
                            </button>
                            <div id="ans${index}" class="hidden mt-4 p-4 bg-green-100 text-green-900 rounded border border-green-300">
                                <p class="font-bold text-xl mb-2">正解：${q.answer}</p>
                                <hr class="border-green-300 mb-2">
                                <p class="text-base leading-relaxed whitespace-pre-wrap">${q.explanation}</p>
                            </div>
                        </div>
                    `;
                    quizContainer.innerHTML += questionBlock;
                });
                quizArea.classList.remove('hidden');
            }

            dashboardPage.classList.add('hidden');
            studyPage.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 過去のデータを呼び出して学習画面を開く
        function loadSavedData() {
            const val = document.getElementById('quiz-folder-select').value;
            if (!val) return alert("復習するフォルダを選択してください。");

            const [L, M, S] = val.split('|');
            const records = studyData[L][M][S]; // 保存された配列データ

            let allTexts = [];
            let allQuestions = [];

            records.forEach(record => {
                if (record.extracted_text) {
                    allTexts.push(record.extracted_text.replace(/\n/g, '<br>'));
                }
                const q = record.generated_questions || record.questions;
                if (q) {
                    allQuestions = allQuestions.concat(q);
                }
            });

            renderStudyPage(allTexts, allQuestions, `📁 ${L} > ${M} > ${S}`);
        }

        // --- 画像圧縮・AI通信処理 ---
        const compressImage = async (file, maxWidth = 1200) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth || height > maxWidth) {
                            if (width > height) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            } else {
                                width = Math.round((width * maxWidth) / height);
                                height = maxWidth;
                            }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', 0.8);
                    };
                    img.onerror = (e) => reject(e);
                };
                reader.onerror = (e) => reject(e);
            });
        };

        const imageInput = document.getElementById('image-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const extractBtn = document.getElementById('extract-btn');
        const questionCountInput = document.getElementById('question-count');

        imageInput.addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                fileNameDisplay.textContent = `📸 ${e.target.files.length}枚の画像がセットされました`;
            }
        });

        extractBtn.addEventListener('click', async function() {
            if(!imageInput.files.length) {
                alert("画像を選択してください！");
                return;
            }

            const L = document.getElementById('folder-large').value.trim();
            const M = document.getElementById('folder-medium').value.trim();
            const S = document.getElementById('folder-small').value.trim();

            const mode = document.querySelector('input[name="scan-mode"]:checked').value;
            const formData = new FormData();
            
            extractBtn.textContent = "⚙️ 画像を圧縮中...";
            extractBtn.disabled = true;
            extractBtn.classList.replace('bg-blue-600', 'bg-gray-400');

            for(let i = 0; i < imageInput.files.length; i++){
                const compressedFile = await compressImage(imageInput.files[i]);
                formData.append("files", compressedFile);
            }
            formData.append("mode", mode);
            formData.append("num_questions", questionCountInput.value);

            extractBtn.textContent = "⚙️ AIが解析・問題生成中...";

            try {
                const response = await fetch("/api/analyze", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    let errorMsg = "サーバーエラーが発生しました";
                    try {
                        const errData = await response.json();
                        if (errData && errData.error) errorMsg = errData.error;
                    } catch (e) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                
                // 【新規】取得したデータを localStorage に保存する
                saveToFolder(L, M, S, data);

                // 保存後、画面に表示
                let textArr = [];
                if (data.extracted_text) textArr.push(data.extracted_text.replace(/\n/g, '<br>'));
                const questions = data.generated_questions || data.questions;
                
                renderStudyPage(textArr, questions, `📁 ${L || '未分類'} > ${M || '未分類'} > ${S || '未分類'}`);

                // 画像の選択状態をリセット
                imageInput.value = '';
                fileNameDisplay.textContent = '';

            } catch (error) {
                alert("解析に失敗しました。\n詳細: " + error.message);
            } finally {
                extractBtn.textContent = "AIに送信して解析・保存スタート";
                extractBtn.disabled = false;
                extractBtn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        });

        document.getElementById('highlight-btn').addEventListener('click', function() {
            const selection = window.getSelection();
            if (!selection.rangeCount || selection.toString().trim() === '') {
                alert("マーカーを引きたい文字をなぞってからボタンを押してください。");
                return;
            }
            const range = selection.getRangeAt(0);
            const span = document.createElement('span');
            span.className = 'user-mark';
            try {
                range.surroundContents(span);
                selection.removeAllRanges();
            } catch (e) {
                alert("改行などをまたいでマーカーを引くことはできません。");
            }
        });
    </script>
</body>
</html>
